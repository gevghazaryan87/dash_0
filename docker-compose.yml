# version is now using "compose spec"
# v2 and v3 are now combined!
# docker-compose v1.27+ required

services:
  vote:
    build:
      context: ./vote
      target: dev
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./vote:/usr/local/app
    environment:
      - OTEL_SERVICE_NAME=vote-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf # Add this line
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_PYTHON_FLASK_EXCLUDED_URLS=health,static
      # Optional: captures the actual SQL/Redis queries in the spans
      - OTEL_PYTHON_INSTRUMENTATION_HTTP_CAPTURE_HEADERS=server_request
    ports:
      - "8080:80"
    networks:
      - front-tier
      - back-tier
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  result:
    build: ./result
    command: npm start
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./result:/usr/local/app
    environment:
      - OTEL_SERVICE_NAME=result-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://otel-collector:4318/v1/metrics
      - OTEL_METRICS_EXPORTER=otlp
    ports:
      - "8081:80"
    networks:
      - front-tier
      - back-tier
  worker:
    build:
      context: ./worker
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      - OTEL_SERVICE_NAME=worker-service
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_METRICS_EXPORTER=otlp
    networks:
      - back-tier

  redis:
    image: redis:alpine
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: "5s"
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - "db-data:/var/lib/postgresql/data"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: "5s"
    networks:
      - back-tier

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    user: '0:0' # Needed to read /var/run/docker.sock
    command: [ "--config", "/etc/otel/otel-collector-config.yaml" ]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - "./otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - back-tier
    restart: unless-stopped

  # this service runs once to seed the database with votes
  # it won't run unless you specify the "seed" profile
  # docker compose --profile seed up -d
  seed:
    build: ./seed-data
    profiles: [ "seed" ]
    depends_on:
      vote:
        condition: service_healthy
    networks:
      - front-tier
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123" # HTTP interface & ClickStack UI
      - "9000:9000" # Native TCP interface
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 # Allows the UI to manage users
      - CLICKHOUSE_USER=default # Explicitly sets the admin user
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "localhost:8123/ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - back-tier

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      # Optional: Makes it easier to develop by skipping the login screen
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - back-tier
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  db-data:
  clickhouse-data:
  grafana-storage:


networks:
  front-tier:
  back-tier:
