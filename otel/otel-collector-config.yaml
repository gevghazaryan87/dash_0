receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:d
  batch:

exporters:
  debug:
    verbosity: basic
  otlp_http:
    endpoint: "http://clickhouse:8123/v1/traces"

service:
  pipelines:
    traces:
      # These must match the names defined above exactly
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_http]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_http]