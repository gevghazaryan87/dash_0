receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # This replaces the otlp_http block
  clickhouse:
    endpoint: "tcp://clickhouse:9000?database=default"
    timeout: 10s
    retry_on_failure:
      enabled: true

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

service:
  telemetry:
    logs:
      level: "warn" # This keeps your terminal quiet
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      # Tell the pipeline to use the clickhouse exporter
      exporters: [clickhouse]